<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (() => {
        const stored = localStorage.getItem('theme');
        document.documentElement.classList.toggle('dark', stored ? stored === 'dark' : true);
      })();
    </script>
    <meta
      name="description"
      content="Duffy Adams is a software engineer and full-stack developer building real-time web apps, dashboards, automation, and polished user interfaces."
    />
    <title>Duffy Adams | Software Engineer</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
