<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duffy Adams | Terminal Portfolio</title>
    
    <!-- Import Fonts for different themes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Ubuntu+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Default Theme: Classic Green */
            --bg-color: #0c0c0c;
            --text-color: #00ff41;
            --dim-color: #008F11;
            --highlight-color: #e0e0e0;
            --error-color: #ff3333;
            --link-color: #00ccff;
            --font-stack: 'Courier New', Courier, monospace;
            --glow: 0 0 10px rgba(0, 255, 65, 0.7);
        }

        /* Ubuntu Theme */
        body.theme-ubuntu {
            --bg-color: #2c001e; /* Ubuntu Purple */
            --text-color: #e95420; /* Ubuntu Orange */
            --dim-color: #772953; /* Lighter Purple */
            --highlight-color: #ffffff;
            --link-color: #e95420;
            --font-stack: 'Ubuntu Mono', monospace;
            --glow: 0 0 10px rgba(233, 84, 32, 0.6);
        }

        /* Amber Theme (Retro CRT) */
        body.theme-amber {
            --bg-color: #1a1500;
            --text-color: #ffb000;
            --dim-color: #996a00;
            --highlight-color: #ffdf80;
            --error-color: #ff4444;
            --link-color: #ffcc00;
            --font-stack: 'VT323', monospace;
            --glow: 0 0 8px rgba(255, 176, 0, 0.6);
        }

        /* Dracula Theme */
        body.theme-dracula {
            --bg-color: #282a36;
            --text-color: #f8f8f2;
            --dim-color: #6272a4;
            --highlight-color: #bd93f9; /* Purple */
            --error-color: #ff5555;
            --link-color: #8be9fd; /* Cyan */
            --font-stack: 'Fira Code', monospace;
            --glow: 0 0 5px rgba(189, 147, 249, 0.4);
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            font-size: 16px;
            overflow-x: hidden;
            -webkit-font-smoothing: none;
            transition: background-color 0.3s, color 0.3s, font-family 0.3s;
            
            /* Force text wrapping to prevent overflow on mobile */
            overflow-wrap: break-word; 
            word-break: break-word;
        }

        /* Specific font size adjustment for the Amber theme */
        body.theme-amber {
            font-size: 20px;
            line-height: 1.4;
        }

        /* Layout */
        #terminal {
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        /* CRT Overlay Effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
            opacity: 0.6;
        }

        /* Output Area */
        #output {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            scrollbar-width: none;
        }
        #output::-webkit-scrollbar {
            display: none;
        }

        /* Typography & Elements */
        h1, h2, h3 {
            margin: 0 0 10px 0;
            text-transform: uppercase;
            text-shadow: var(--glow);
            font-weight: bold;
            
            /* Ensure headings wrap */
            overflow-wrap: break-word;
            word-break: break-word;
        }

        h1 { font-size: 1.8rem; border-bottom: 1px dashed var(--dim-color); padding-bottom: 10px; }
        h2 { font-size: 1.4rem; margin-top: 20px; color: var(--highlight-color); }
        h3 { font-size: 1.1rem; color: var(--text-color); }

        p {
            line-height: 1.5;
            margin-bottom: 10px;
            max-width: 80ch; /* Desktop restriction */
            
            /* Wrapping for long technical terms */
            overflow-wrap: break-word;
            word-break: break-word;
        }

        ul {
            list-style-type: disc;
            padding-left: 20px;
            margin-bottom: 15px;
        }

        li {
            margin-bottom: 5px;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
            border-bottom: 1px dotted var(--link-color);
            transition: all 0.2s;
            
            /* Critical fix for long URLs on mobile */
            overflow-wrap: break-word;
            word-break: break-all;
        }
        a:hover {
            background-color: var(--link-color);
            color: var(--bg-color);
        }

        .command-log {
            color: var(--dim-color);
            margin-bottom: 5px;
            
            /* Allow command logs to wrap if typed text is very long */
            white-space: pre-wrap; 
            overflow-wrap: break-word;
        }
        .command-log::before {
            content: "$ ";
            color: var(--text-color);
        }

        /* Input Area */
        .input-area {
            display: flex;
            align-items: center;
            margin-top: auto;
        }

        .prompt {
            color: var(--text-color);
            margin-right: 10px;
            white-space: nowrap;
            text-shadow: var(--glow);
        }

        #command-input {
            background: transparent;
            border: none;
            color: var(--highlight-color);
            font-family: var(--font-stack);
            font-size: 16px;
            flex-grow: 1;
            outline: none;
            caret-color: var(--text-color);
        }
        body.theme-amber #command-input {
            font-size: 20px; /* Match body size for Amber */
        }

        /* Utility Classes */
        .text-dim { color: var(--dim-color); }
        .text-bright { color: var(--highlight-color); }
        .text-error { color: var(--error-color); }
        .section-block {
            border-left: 2px solid var(--dim-color);
            padding-left: 15px;
            margin-bottom: 20px;
            /* Ensure content inside block doesn't overflow border */
            overflow: hidden;
        }

        /* Mobile Helpers */
        .quick-commands {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85rem;
        }
        .cmd-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--dim-color);
            color: var(--dim-color);
            padding: 4px 8px;
            cursor: pointer;
            font-family: var(--font-stack);
            text-transform: uppercase;
        }
        .cmd-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        /* Stars Container */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* Individual Stars */
        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out, move 20s infinite linear;
        }

        .star.small {
            width: 1px;
            height: 1px;
        }

        .star.medium {
            width: 2px;
            height: 2px;
        }

        .star.large {
            width: 3px;
            height: 3px;
        }

        /* --- REALISTIC COMET CSS --- */
        
        /* The glowing head of the comet */
        .comet-head {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #fff 0%, #fff 40%, rgba(255,255,255,0) 100%);
            border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.9);
            z-index: 2;
            pointer-events: none;
            will-change: transform, left, top;
        }

        /* The particles that make up the tail */
        .comet-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: fadeParticle 2s linear forwards;
        }

        @keyframes fadeParticle {
            0% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
        }

        /* --- END REALISTIC COMET CSS --- */

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes move {
            0% { transform: translateY(0px) translateX(0px); }
            25% { transform: translateY(-10px) translateX(5px); }
            50% { transform: translateY(-5px) translateX(-5px); }
            75% { transform: translateY(5px) translateX(10px); }
            100% { transform: translateY(0px) translateX(0px); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.4rem; }
            h2 { font-size: 1.2rem; }
            #terminal { padding: 15px; }
            .quick-commands { display: flex; }

            /* Fix for Paragraphs on Mobile - remove width limit */
            p {
                max-width: 100%;
            }

            /* Fix for Input/Prompt wrapping on tiny screens */
            .input-area {
                flex-wrap: wrap;
            }
            .prompt {
                white-space: normal;
                width: 100%;
                margin-bottom: 5px;
            }
            #command-input {
                width: 100%;
            }
        }
    </style>
</head>

        // --- Core Logic ---
        const outputDiv = document.getElementById('output');
        const input = document.getElementById('command-input');
        const themeBtn = document.getElementById('theme-toggle-btn');
        const cliPrompt = document.getElementById('cli-prompt');
        const themes = ['classic', 'ubuntu', 'amber', 'dracula'];
        
        let commandHistory = [];
        let historyIndex = -1;
        let currentUser = "Visitor"; // Default

        // --- Device Detection ---
        function getDeviceName() {
            const ua = navigator.userAgent;
            // Check for mobile devices first
            if (/Android/i.test(ua)) return "android";
            if (/iPhone/i.test(ua)) return "iphone";
            if (/iPad/i.test(ua)) return "ipad";
            if (/iPod/i.test(ua)) return "ipod";

            // Check for Desktops
            if (/Windows/i.test(ua)) return "windows";
            if (/Mac/i.test(ua)) return "macos";
            if (/Linux/i.test(ua)) return "linux";

            return "visitor"; // Fallback
        }

        function updatePrompt() {
            const device = getDeviceName();
            currentUser = device;
            cliPrompt.textContent = `${currentUser}@duffyadams:~$`;
        }

        // Theme Handling
        // Silent flag prevents logging "Theme changed to..." during boot
        function applyTheme(themeName, silent = false) {
            const body = document.body;
            
            // Remove all existing theme classes
            themes.forEach(t => body.classList.remove(`theme-${t}`));
            
            if (themes.includes(themeName)) {
                body.classList.add(`theme-${themeName}`);
                localStorage.setItem('terminal-theme', themeName);
                
                // Update Button Text
                updateButton(themeName);

                // Only print to terminal if not silent (e.g. boot sequence)
                if (!silent) {
                    printLine(`Theme changed to ${themeName}.`, 'text-bright');
                    scrollToBottom();
                }
            } else {
                printLine(`Theme not found. Available themes: ${themes.join(', ')}`, 'text-error');
                scrollToBottom();
            }
        }

        function updateButton(themeName) {
            if (themeBtn) {
                // Capitalize first letter for display
                const display = themeName.charAt(0).toUpperCase() + themeName.slice(1);
                themeBtn.textContent = `Theme: ${display}`;
            }
        }

        function toggleTheme() {
            const body = document.body;
            let currentTheme = 'classic';

            // Determine current theme based on classList
            for (let theme of themes) {
                if (body.classList.contains(`theme-${theme}`)) {
                    currentTheme = theme;
                    break;
                }
            }

            // Find index and calculate next index
            const currentIndex = themes.indexOf(currentTheme);
            const nextIndex = (currentIndex + 1) % themes.length;
            const nextTheme = themes[nextIndex];

            // Execute command to show in terminal + apply theme
            printLine(`${currentUser}@duffyadams:~$ toggletheme`, 'command-log');
            applyTheme(nextTheme, false);
        }

        // Boot Sequence
        window.onload = () => {
            input.focus();
            
            // 1. Detect Device and set prompt
            updatePrompt();

            // 2. Load saved theme silently
            const savedTheme = localStorage.getItem('terminal-theme');
            if (savedTheme) {
                applyTheme(savedTheme, true); // Silent: No log
            } else {
                // If no saved theme, ensure button matches default state
                updateButton('classic');
            }

            const deviceName = currentUser;
            const bootText = [
                "Initializing kernel...",
                "Loading modules...",
                "Mounting volumes...",
                "Accessing resume database...",
                `Connection established from ${deviceName}.`
            ];
            
            let delay = 0;
            bootText.forEach((line, index) => {
                setTimeout(() => {
                    printLine(line, 'text-dim', true);
                    
                    if(index === bootText.length - 1) {
                        // Reduced wait time from 1000ms to 600ms
                        setTimeout(() => {
                            const logs = document.querySelectorAll('.boot-log');
                            logs.forEach(log => log.remove());
                            execute('intro');
                        }, 600);
                    }
                }, delay);
                // Reduced delay between lines from 400ms to 250ms
                delay += 250;
            });
        };

        // Keep focus on input
        document.addEventListener('click', () => input.focus());

        // Input Handling
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value.trim().toLowerCase();
                if (cmd) {
                    addToHistory(cmd);
                    printLine(`${currentUser}@duffyadams:~$ ${input.value}`, 'command-log');
                    execute(cmd);
                }
                input.value = '';
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    input.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    input.value = commandHistory[historyIndex];
                } else {
                    historyIndex = commandHistory.length;
                    input.value = '';
                }
            }
        });

        function addToHistory(cmd) {
            commandHistory.push(cmd);
            historyIndex = commandHistory.length;
        }

            // Hidden stars command
            if (cmd === 'stars') {
                const body = document.body;

                    body.classList.remove('stars-mode');
                    deactivateStars();
                    printLine('Stars deactivated.', 'text-dim');
                } else {

                    activateStars();
                    printLine('Stars activated.', 'text-bright');
                }
                scrollToBottom();
                return;
            }

            // Standard Commands

            }

                case 'education': content = resumeContent.education; break;
                case 'skills': content = resumeContent.skills; break;
                case 'projects': content = resumeContent.projects; break;
                case 'contact': content = resumeContent.contact; break;
                case 'download': content = resumeContent.download; break;
                case 'intro': content = resumeContent.intro; break;
                case 'ls': 
                    content = `<div class="text-dim">about  experience  education  projects  skills  contact</div>`; 
                    break;
                case 'whoami':
                    content = `<div class="text-bright">${currentUser}@duffyadams</div>`;
                    break;
                default:
                    content = `<div class="text-error">Command not found: ${cmd}. Type 'help' for list.</div>`;
            }

            if (content) {
                const wrapper = document.createElement('div');
                wrapper.innerHTML = content;
                outputDiv.appendChild(wrapper);
            }
            
            scrollToBottom();
        }

        function printLine(text, className = '', isBoot = false) {
            const div = document.createElement('div');
            div.className = className;
            if (isBoot) div.classList.add('boot-log');
            div.textContent = text;
            outputDiv.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        // --- Realistic Star & Comet Logic ---

        let starsContainer;
        let cometInterval;

        function activateStars() {
            // Create stars container if it doesn't exist
            if (!starsContainer) {
                starsContainer = document.createElement('div');
                starsContainer.className = 'stars-container';
                document.body.appendChild(starsContainer);
            }

            // Clear any existing stars/comets
            starsContainer.innerHTML = '';

            // Generate random stars
            const numStars = 150;
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                const size = Math.random() < 0.7 ? 'small' : Math.random() < 0.9 ? 'medium' : 'large';
                star.className = `star ${size}`;

                // Random position
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';

                // Random animation delay
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 10 + 15) + 's';

                starsContainer.appendChild(star);
            }

            // Start comet spawning (Realistic)
            // Spawn a comet every 8-15 seconds
            cometInterval = setInterval(() => {
                spawnRealisticComet();
            }, Math.random() * 7000 + 8000);
        }

        function deactivateStars() {
            if (starsContainer) {
                starsContainer.innerHTML = '';
            }
            if (cometInterval) {
                clearInterval(cometInterval);
                cometInterval = null;
            }
        }

        function getCometColor() {
            // Helper to match comet color to the current theme
            if (document.body.classList.contains('theme-ubuntu')) return 'rgba(233, 84, 32, 0.7)'; // Orange
            if (document.body.classList.contains('theme-amber')) return 'rgba(255, 176, 0, 0.8)'; // Amber
            if (document.body.classList.contains('theme-dracula')) return 'rgba(189, 147, 249, 0.7)'; // Purple
            return 'rgba(0, 255, 65, 0.6)'; // Classic Green (fallback)
        }

        function spawnRealisticComet() {
            if (!starsContainer) return;

            // 1. Create Comet Head
            const head = document.createElement('div');
            head.className = 'comet-head';
            
            // 2. Determine Starting Position (randomly Top or Left edge)
            const startSide = Math.random();
            let x, y, vx, vy;

            if (startSide < 0.5) {
                // Start Top (random X, Y is negative)
                x = Math.random() * window.innerWidth;
                y = -100;
            } else {
                // Start Left (X is negative, random Y)
                x = -100;
                y = Math.random() * (window.innerHeight * 0.6); // Top 60% of screen
            }

            // 3. Determine Velocity (Angle and Speed)
            // Angle: generally diagonally down-right (45 degrees)
            // We add slight randomness to the angle (-0.2 to +0.2 radians)
            const angle = (Math.PI / 4) + (Math.random() * 0.4 - 0.2);
            const speed = Math.random() * 8 + 12; // Speed between 12 and 20 pixels per frame

            vx = Math.cos(angle) * speed;
            vy = Math.sin(angle) * speed;

            // Apply initial position
            head.style.left = `${x}px`;
            head.style.top = `${y}px`;

            // Adjust head glow color based on theme
            const color = getCometColor();
            head.style.boxShadow = `0 0 15px 4px ${color}`;

            starsContainer.appendChild(head);

            // 4. Animation Loop variables
            let frames = 0;
            const particleSpawnRate = 2; // Spawn a particle every N frames

            function animate() {
                // Move Head
                x += vx;
                y += vy;
                
                head.style.left = `${x}px`;
                head.style.top = `${y}px`;

                // Create Trail Particles
                if (frames % particleSpawnRate === 0) {
                    const p = document.createElement('div');
                    p.className = 'comet-particle';
                    
                    // Randomize particle size slightly
                    const size = Math.random() * 3 + 1;
                    p.style.width = `${size}px`;
                    p.style.height = `${size}px`;
                    
                    // Set position (same as head currently)
                    p.style.left = `${x}px`;
                    p.style.top = `${y}px`;
                    
                    // Color
                    p.style.backgroundColor = color;
                    
                    starsContainer.appendChild(p);

                    // Cleanup particle after animation (2s matches CSS)
                    setTimeout(() => {
                        if (p.parentNode) p.parentNode.removeChild(p);
                    }, 2000);
                }

                frames++;

                // Check bounds - Remove if completely off screen (Bottom or Right)
                const margin = 100;
                if (x < window.innerWidth + margin && y < window.innerHeight + margin) {
                    requestAnimationFrame(animate);
                } else {
                    // Remove head
                    if (head.parentNode) head.parentNode.removeChild(head);
                }
            }

            // Start animation
            requestAnimationFrame(animate);
        }
    </script>
</body>
